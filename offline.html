<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Upright Condensing Precision Clock</title>
  <meta name="theme-color" content="#0ea5e9">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #333333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #f5f5f5;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .icon { font-size: 64px; display: block; margin-bottom: 24px; }
    h1 { font-size: 1.5rem; color: #0ea5e9; margin-bottom: 12px; font-weight: 700; }
    p { color: #666666; font-size: .95rem; line-height: 1.6; margin-bottom: 8px; }
    .app-name { font-weight: 600; color: #333333; }
    .btn {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 32px;
      background: #0ea5e9;
      color: #000;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: .9rem;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .status {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,183,0,.12);
      color: #b38600;
      border-radius: 999px;
      padding: 6px 16px;
      font-size: .8rem;
      margin-top: 20px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ffb700; }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>You're Offline</h1>
    <p>
      <span class="app-name">Upright Condensing Precision Clock</span> requires an internet connection to load new content.
    </p>
    <p>Check your connection and try again, or browse previously cached pages.</p>
    <div class="status">
      <span class="dot"></span> No internet connection
    </div>
    <br>
    <button class="btn" onclick="window.location.reload()">↺ Try Again</button>
  </div>
  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', function() {
      window.location.reload();
    });
  </script>
</body>
</html>
